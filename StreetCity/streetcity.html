<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Street Racer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:Arial,sans-serif}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── MENÜ ──────────────────────────────────────────────── */
#menuScreen{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(180deg,#080818 0%,#181030 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
}
#menuScreen h1{font-size:clamp(30px,8vw,56px);font-weight:900;color:#FF3333;
  text-shadow:0 0 24px rgba(255,51,51,.55);letter-spacing:3px;margin-bottom:0}
#menuScreen .sub{font-size:clamp(10px,2.5vw,14px);color:#666;letter-spacing:4px;margin-top:-4px}
#carSelect{display:flex;gap:10px;margin:10px 0}
.cOpt{width:48px;height:32px;border-radius:7px;border:3px solid #333;cursor:pointer;transition:all .15s}
.cOpt.sel{border-color:#fff;transform:scale(1.22);box-shadow:0 0 14px rgba(255,255,255,.35)}
.mBtn{width:min(260px,76vw);padding:13px 0;border-radius:25px;border:none;
  font-size:clamp(13px,3.8vw,17px);font-weight:bold;letter-spacing:2px;cursor:pointer;
  transition:transform .1s;-webkit-tap-highlight-color:transparent}
.mBtn:active{transform:scale(.95)}
.mBtnR{background:linear-gradient(135deg,#FF3333,#990000);color:#fff}
.mBtnG{background:rgba(255,255,255,.09);color:#ccc;border:2px solid rgba(255,255,255,.22)!important}
#menuTip{color:#393939;font-size:11px;text-align:center;line-height:1.9;margin-top:4px}

/* ── HUD ───────────────────────────────────────────────── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20;display:none}
#topBar{position:absolute;top:0;left:0;right:0;
  background:linear-gradient(rgba(0,0,0,.72),transparent);
  padding:10px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.hLabel{font-size:9px;color:#888;letter-spacing:2px;text-transform:uppercase}
#posVal{font-size:clamp(24px,7vw,40px);font-weight:900;color:#FFD700;line-height:1}
#lapVal{font-size:clamp(15px,4vw,22px);font-weight:bold;color:#fff;text-align:center}
#timeVal{font-size:clamp(15px,4vw,20px);font-weight:bold;color:#fff;font-variant-numeric:tabular-nums;text-align:right}
#spdBox{position:absolute;bottom:200px;left:12px;
  background:rgba(0,0,0,.74);border:2px solid #FF3333;border-radius:10px;
  padding:6px 12px;text-align:center;min-width:70px}
#spdVal{font-size:clamp(20px,5.5vw,32px);font-weight:900;color:#fff}
#spdUnit{font-size:9px;color:#888}
#nitroWrap{position:absolute;bottom:200px;left:92px;
  background:rgba(0,0,0,.7);border:2px solid #00CCFF;border-radius:8px;
  padding:5px 8px;width:100px}
#nitroLbl{color:#00CCFF;font-size:9px;font-weight:bold;text-align:center}
#nitroTrack{height:8px;background:rgba(255,255,255,.12);border-radius:4px;margin-top:3px}
#nitroFill{height:100%;background:#00CCFF;border-radius:4px;width:100%;transition:width .1s}
#pauseBtn{position:absolute;top:12px;right:14px;pointer-events:all;
  background:rgba(0,0,0,.6);color:#fff;border:2px solid rgba(255,255,255,.25);
  border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}

/* ── KONTROLLER ────────────────────────────────────────── */
#ctrl{position:fixed;bottom:0;left:0;right:0;height:195px;z-index:20;pointer-events:none;display:none}
#leftZone{position:absolute;left:0;top:0;width:210px;height:195px;pointer-events:all}
#jBase{position:absolute;width:112px;height:112px;border-radius:50%;
  background:rgba(255,255,255,.1);border:2.5px solid rgba(255,255,255,.28);display:none}
#jKnob{position:absolute;width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.72);border:2px solid #fff;display:none}
#rightZone{position:absolute;right:8px;bottom:8px;
  display:grid;
  grid-template-areas:"nitro nitro""brake gas""hbk   gas";
  grid-template-columns:80px 88px;
  grid-template-rows:46px 66px 66px;
  gap:6px;pointer-events:all}
.btn{border-radius:12px;border:2px solid rgba(255,255,255,.3);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;font-weight:bold;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none}
.bIcon{font-size:22px;line-height:1}
.bLbl{font-size:9px;opacity:.8;letter-spacing:1px}
#bNitro{grid-area:nitro;background:rgba(0,180,220,.82);font-size:14px;font-weight:bold}
#bBrake{grid-area:brake;background:rgba(210,50,50,.82)}
#bHbk  {grid-area:hbk;  background:rgba(255,130,0,.82)}
#bGas  {grid-area:gas;  background:rgba(15,170,75,.88);font-size:34px}

/* ── COUNTDOWN ─────────────────────────────────────────── */
#cdOverlay{position:fixed;inset:0;z-index:55;display:none;
  align-items:center;justify-content:center;background:rgba(0,0,0,.38)}
#cdNum{font-size:clamp(88px,22vw,148px);font-weight:900;color:#fff;
  text-shadow:0 0 40px rgba(255,255,255,.55);animation:cdPop .5s ease-out}
@keyframes cdPop{from{transform:scale(2);opacity:0}to{transform:scale(1);opacity:1}}

/* ── NOTIF ─────────────────────────────────────────────── */
#notif{position:fixed;top:76px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.88);color:#fff;padding:9px 20px;
  border-radius:9px;font-size:14px;font-weight:bold;
  display:none;z-index:45;white-space:nowrap;border:2px solid rgba(255,255,255,.25)}

/* ── SONUÇ ─────────────────────────────────────────────── */
#resultScreen{position:fixed;inset:0;z-index:80;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;background:rgba(0,0,0,.92)}
#resTitle{font-size:clamp(26px,7vw,50px);font-weight:900;text-align:center;color:#FFD700}
#resTime{font-size:clamp(15px,4vw,22px);color:#fff;text-align:center}
#resPos{font-size:clamp(13px,3.5vw,17px);color:#aaa;text-align:center}

/* ── PAUSE ─────────────────────────────────────────────── */
#pauseScreen{position:fixed;inset:0;z-index:60;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;background:rgba(0,0,0,.88)}
#pauseScreen h2{color:#fff;font-size:32px;font-weight:900}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- ANA MENÜ -->
<div id="menuScreen">
  <h1>🏎 STREET RACER</h1>
  <div class="sub">MOBİL YARIŞ MVP</div>
  <div style="color:#555;font-size:11px;letter-spacing:2px">ARAÇ SEÇ:</div>
  <div id="carSelect"></div>
  <button class="mBtn mBtnR" id="btnPlay">▶ &nbsp;YARIŞA BAŞLA</button>
  <div id="menuTip">Sol: Joystick direksiyon &nbsp;|&nbsp; Sağ: GAZ / FREN / NİTRO<br>3 tur tamamla — rakipleri geç!</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="topBar">
    <div><div id="posVal">1.</div><div class="hLabel">Pozisyon</div></div>
    <div style="text-align:center"><div id="lapVal">1/3</div><div class="hLabel">Tur</div></div>
    <div><div id="timeVal">0:00.0</div><div class="hLabel" style="text-align:right">Süre</div></div>
  </div>
  <div id="spdBox"><div id="spdVal">0</div><div id="spdUnit">km/h</div></div>
  <div id="nitroWrap">
    <div id="nitroLbl">⚡ NİTRO</div>
    <div id="nitroTrack"><div id="nitroFill"></div></div>
  </div>
  <button id="pauseBtn">⏸</button>
</div>

<!-- KONTROLLER -->
<div id="ctrl">
  <div id="leftZone"><div id="jBase"></div><div id="jKnob"></div></div>
  <div id="rightZone">
    <div class="btn" id="bNitro">⚡ NİTRO</div>
    <div class="btn" id="bBrake"><span class="bIcon">🛑</span><span class="bLbl">FREN</span></div>
    <div class="btn" id="bHbk"><span class="bIcon">🔒</span><span class="bLbl">EL FR</span></div>
    <div class="btn" id="bGas">▲</div>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="cdOverlay"><div id="cdNum">3</div></div>

<!-- NOTIF -->
<div id="notif"></div>

<!-- SONUÇ -->
<div id="resultScreen">
  <div id="resTitle">🏆 BİRİNCİ OLDUN!</div>
  <div id="resTime">Süre: 2:34.7</div>
  <div id="resPos">Yarışı 1. sırada bitirdin</div>
  <button class="mBtn mBtnR" id="btnAgain" style="margin-top:6px">🔄 &nbsp;TEKRAR OYNA</button>
  <button class="mBtn mBtnG" id="btnGoMenu">🏠 &nbsp;MENÜ</button>
</div>

<!-- PAUSE -->
<div id="pauseScreen">
  <h2>⏸ DURAKLANDI</h2>
  <button class="mBtn mBtnR" id="btnResume">▶ DEVAM ET</button>
  <button class="mBtn mBtnG" id="btnMenuP">🏠 MENÜ</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
'use strict';
// ════════════════════════════════════════════════════════
//  STREET RACER — MVP v2  |  Gerçek yarış, AI rakipler
//  Oval pist, 3-2-1 sayım, 3 tur, pozisyon takibi
// ════════════════════════════════════════════════════════

const CAR_COLORS = [0xFF3333, 0x2277FF, 0xFFCC00, 0x222222, 0x22BB55];
const CAR_NAMES  = ['Kırmızı','Mavi','Sarı','Siyah','Yeşil'];
const TOTAL_LAPS = 3;
const ROAD_W     = 16;
const HALF_W     = ROAD_W * 0.5;
const WP_R       = 14;   // waypoint yakalama yarıçapı

let selectedCar = 0;
let state       = 'menu'; // menu|countdown|racing|paused|result
let raceTimer   = 0;

// ── THREE.JS INIT ───────────────────────────────────────
let renderer, scene, camera, clock;

function initThree() {
  const canvas = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x88CCEE);
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x88CCEE, 110, 260);
  camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.4, 350);
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xFFFDE0, 1.0);
  sun.position.set(60, 100, 40);
  scene.add(sun);
  clock = new THREE.Clock();
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

// ── PİST WAYPOINTS (oval, 12 nokta) ────────────────────
const WP_DATA = [
  [  0, -90], [ 44, -88], [ 84, -58],
  [ 95,  -8], [ 84,  44], [ 44,  84],
  [  0,  90], [-44,  84], [-84,  44],
  [-95,  -8], [-84, -58], [-44, -88]
];
const WAYPOINTS = WP_DATA.map(([x,z]) => new THREE.Vector3(x, 0, z));
let trackCurve, trackSamples;

// ── PİST İNŞA ──────────────────────────────────────────
function buildTrack() {
  trackCurve   = new THREE.CatmullRomCurve3([...WAYPOINTS], true);
  trackSamples = trackCurve.getPoints(400);

  // Zemin
  const gnd = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshLambertMaterial({ color: 0x2E7D32 })
  );
  gnd.rotation.x = -Math.PI / 2;
  gnd.position.y = -0.05;
  scene.add(gnd);

  buildRoadMesh();
  buildKerbs();
  buildStartLine();
  buildScenery();
}

function buildRoadMesh() {
  const N   = 400;
  const pts = trackCurve.getPoints(N);
  const pos = new Float32Array(N * 6);
  const idx = [];

  for (let i = 0; i < N; i++) {
    const c  = pts[i];
    const nx = pts[(i + 1) % N];
    const dx = nx.x - c.x, dz = nx.z - c.z;
    const len = Math.sqrt(dx*dx + dz*dz) || 1;
    const px = -dz / len, pz = dx / len;
    pos[i*6  ] = c.x - px*HALF_W; pos[i*6+1] = 0.04; pos[i*6+2] = c.z - pz*HALF_W;
    pos[i*6+3] = c.x + px*HALF_W; pos[i*6+4] = 0.04; pos[i*6+5] = c.z + pz*HALF_W;
    const a = i*2, b = i*2+1, c2 = ((i+1)%N)*2, d = ((i+1)%N)*2+1;
    idx.push(a, c2, b,  b, c2, d);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  scene.add(new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x1A1A1A, side: THREE.DoubleSide })));

  // Orta çizgiler (kesikli beyaz)
  const lMat = new THREE.MeshLambertMaterial({ color: 0xFFFFFF });
  for (let i = 0; i < N; i += 8) {
    const p1 = pts[i], p2 = pts[(i+4)%N];
    const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
    const dx = p2.x - p1.x, dz = p2.z - p1.z;
    const len = Math.sqrt(dx*dx + dz*dz) || 1;
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.05, len), lMat);
    m.position.set(mid.x, 0.07, mid.z);
    m.rotation.y = Math.atan2(dx, dz);
    scene.add(m);
  }
}

function buildKerbs() {
  const N   = 400;
  const pts = trackCurve.getPoints(N);
  const rMat = new THREE.MeshLambertMaterial({ color: 0xFF2222 });
  const wMat = new THREE.MeshLambertMaterial({ color: 0xEEEEEE });
  for (let i = 0; i < N; i += 3) {
    const c = pts[i], nx = pts[(i+1)%N];
    const dx = nx.x - c.x, dz = nx.z - c.z;
    const len = Math.sqrt(dx*dx + dz*dz) || 1;
    const px = -dz/len, pz = dx/len;
    const mat = Math.floor(i/3) % 2 === 0 ? rMat : wMat;
    [-(HALF_W+0.9), (HALF_W+0.9)].forEach(s => {
      const kb = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.12, 1.6), mat);
      kb.position.set(c.x + px*s, 0.06, c.z + pz*s);
      scene.add(kb);
    });
  }
}

function buildStartLine() {
  const w0  = WAYPOINTS[0], w1 = WAYPOINTS[1];
  const dir  = new THREE.Vector3().subVectors(w1, w0).normalize();
  const perp = new THREE.Vector3(-dir.z, 0, dir.x);
  const cols = 8, cw = ROAD_W / cols;
  const bMats = [
    new THREE.MeshLambertMaterial({ color: 0xFFFFFF }),
    new THREE.MeshLambertMaterial({ color: 0x111111 })
  ];
  for (let c = 0; c < cols; c++) {
    const cell = new THREE.Mesh(new THREE.BoxGeometry(cw, 0.07, 1.6), bMats[c%2]);
    cell.position.copy(w0);
    cell.position.addScaledVector(perp, (c - cols/2 + 0.5) * cw);
    cell.position.y = 0.08;
    cell.rotation.y = Math.atan2(dir.x, dir.z);
    scene.add(cell);
  }
  // Start/Finish direkleri
  const poleMat = new THREE.MeshLambertMaterial({ color: 0xAAAAAA });
  [-(HALF_W+1.5), (HALF_W+1.5)].forEach(s => {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 7, 6), poleMat);
    pole.position.set(w0.x + perp.x*s, 3.5, w0.z + perp.z*s);
    scene.add(pole);
    const flag = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.9, 0.06),
      new THREE.MeshLambertMaterial({ color: 0xFF3333 }));
    flag.position.set(w0.x + perp.x*s + dir.x*0.9, 7.1, w0.z + perp.z*s + dir.z*0.9);
    scene.add(flag);
  });
}

function buildScenery() {
  const rng  = seededRng(17);
  const tLeaf  = new THREE.MeshLambertMaterial({ color: 0x1B5E20 });
  const tTrunk = new THREE.MeshLambertMaterial({ color: 0x5D4037 });
  const bMats  = [
    new THREE.MeshLambertMaterial({ color: 0x455A64 }),
    new THREE.MeshLambertMaterial({ color: 0x6D4C41 }),
    new THREE.MeshLambertMaterial({ color: 0x37474F }),
  ];
  for (let i = 0; i < 80; i++) {
    const ang = (i / 80) * Math.PI * 2;
    const r = 120 + rng() * 40;
    const x = Math.sin(ang) * r, z = Math.cos(ang) * r;
    if (distToTrackFast(x, z) < 26) continue;
    if (rng() < 0.55) {
      const h = 4 + rng() * 10;
      const tr = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.38, h, 6), tTrunk);
      tr.position.set(x, h/2, z); scene.add(tr);
      const lv = new THREE.Mesh(new THREE.SphereGeometry(2 + rng(), 6, 5), tLeaf);
      lv.position.set(x, h + 1.6, z); scene.add(lv);
    } else {
      const h = 6 + rng() * 18, w = 8 + rng() * 10;
      const bld = new THREE.Mesh(new THREE.BoxGeometry(w, h, w*0.7), bMats[i%3]);
      bld.position.set(x, h/2, z); scene.add(bld);
    }
  }
  // Tribünler
  const tribMat = new THREE.MeshLambertMaterial({ color: 0x78909C });
  for (let i = 0; i < 6; i++) {
    const ang = (i/6)*Math.PI*2 + 0.3;
    const trib = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 6), tribMat);
    trib.position.set(Math.sin(ang)*150, 5, Math.cos(ang)*150);
    trib.rotation.y = ang;
    scene.add(trib);
  }
}

function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 4294967296; };
}

// ── ARAÇ MESH ──────────────────────────────────────────
function makeCarMesh(color) {
  const g     = new THREE.Group();
  const bMat  = new THREE.MeshLambertMaterial({ color });
  const dkMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const glMat = new THREE.MeshLambertMaterial({ color: 0x88BBFF, transparent: true, opacity: 0.65 });
  const rmMat = new THREE.MeshLambertMaterial({ color: 0xBBBBBB });

  const body = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.66, 4.1), bMat);
  body.position.y = 0.5; g.add(body);
  const cab = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.62, 2.1), bMat);
  cab.position.set(0, 1.19, 0.1); g.add(cab);
  const wf = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 0.08), glMat);
  wf.position.set(0, 1.2, 1.13); wf.rotation.x = 0.28; g.add(wf);
  const wr = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 0.08), glMat);
  wr.position.set(0, 1.2, -0.98); wr.rotation.x = -0.28; g.add(wr);

  const fLt = new THREE.MeshLambertMaterial({ color: 0xFFFF88 });
  const sLt = new THREE.MeshLambertMaterial({ color: 0xFF2200 });
  [-0.7, 0.7].forEach(ox => {
    const f = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.18, 0.08), fLt);
    f.position.set(ox, 0.55, 2.07); g.add(f);
    const s = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.18, 0.08), sLt);
    s.position.set(ox, 0.55, -2.07); g.add(s);
  });

  const wheels = [];
  [[-1.1,0.3,1.38],[1.1,0.3,1.38],[-1.1,0.3,-1.38],[1.1,0.3,-1.38]].forEach(([ox,oy,oz]) => {
    const wg = new THREE.Group();
    const wt = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.22, 10), dkMat);
    wt.rotation.z = Math.PI/2; wg.add(wt);
    const rm = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.24, 6), rmMat);
    rm.rotation.z = Math.PI/2; wg.add(rm);
    wg.position.set(ox, oy, oz); g.add(wg); wheels.push(wg);
  });
  g._wheels = wheels;
  return g;
}

// ── OYUNCU & AI NESNELERİ ──────────────────────────────
const player = {
  mesh:null, wheels:null,
  x:0, z:0, angle:0, speed:0, steer:0,
  maxSpeed:40, accel:28, brakeF:80, friction:0.91, maxSteer:0.52,
  steerSpd:3.2, steerRet:6,
  nitroOn:false, nitroCh:false, nitroPct:1,
  wpNext:1, lapsDone:0, raceFinished:false
};

const AI_CFG = [
  { color:0x3388FF, maxSpeed:31, accel:22 },
  { color:0xFFCC00, maxSpeed:29, accel:20 },
  { color:0xFF6600, maxSpeed:33, accel:23 },
];
let aiCars = [];

function spawnAll() {
  if (player.mesh) scene.remove(player.mesh);
  aiCars.forEach(a => scene.remove(a.mesh));
  aiCars = [];

  const w0 = WAYPOINTS[0], w1 = WAYPOINTS[1];
  const dir  = new THREE.Vector3().subVectors(w1, w0).normalize();
  const perp = new THREE.Vector3(-dir.z, 0, dir.x);
  const back = dir.clone().negate();
  const startAngle = Math.atan2(dir.x, dir.z);

  const grid = [
    w0.clone().addScaledVector(back, 3),
    w0.clone().addScaledVector(back,11).addScaledVector(perp, -3.5),
    w0.clone().addScaledVector(back,11).addScaledVector(perp,  3.5),
    w0.clone().addScaledVector(back,19),
  ];

  // Oyuncu
  player.mesh   = makeCarMesh(CAR_COLORS[selectedCar]);
  player.wheels = player.mesh._wheels;
  player.x = grid[0].x; player.z = grid[0].z;
  player.angle = startAngle;
  player.speed = 0; player.steer = 0;
  player.maxSpeed = [40,34,30,36,44][selectedCar];
  player.accel    = [28,22,20,26,35][selectedCar];
  player.wpNext = 1; player.lapsDone = 0;
  player.raceFinished = false;
  player.nitroOn = false; player.nitroCh = false; player.nitroPct = 1;
  player.mesh.position.set(player.x, 0, player.z);
  player.mesh.rotation.y = player.angle;
  scene.add(player.mesh);

  // AI araçları
  AI_CFG.forEach((cfg, i) => {
    const pos = grid[i+1];
    const m = makeCarMesh(cfg.color);
    const ai = {
      mesh: m, x: pos.x, z: pos.z,
      angle: startAngle, speed: 0,
      maxSpeed: cfg.maxSpeed * (0.9 + Math.random()*0.15),
      accel: cfg.accel, brakeF: 55,
      wpNext: 1, lapsDone: 0, raceFinished: false,
    };
    m.position.set(ai.x, 0, ai.z); m.rotation.y = ai.angle;
    scene.add(m); aiCars.push(ai);
  });
}

// ── INPUT ───────────────────────────────────────────────
const inp = { steer:0, gas:0, brake:false, hbk:false };
let joyId=-1, jBX=0, jBY=0;
const JR = 54;

function setupInput() {
  const lz = document.getElementById('leftZone');
  const jB = document.getElementById('jBase');
  const jK = document.getElementById('jKnob');

  lz.addEventListener('touchstart', e => {
    e.preventDefault();
    if (joyId !== -1) return;
    const t = e.changedTouches[0];
    joyId = t.identifier; jBX = t.clientX; jBY = t.clientY;
    jB.style.cssText = `left:${jBX-56}px;top:${jBY-56}px;display:block`;
    jK.style.cssText = `left:${jBX-24}px;top:${jBY-24}px;display:block`;
  }, { passive:false });

  lz.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== joyId) continue;
      const dx = t.clientX-jBX, dy = t.clientY-jBY;
      const d = Math.sqrt(dx*dx+dy*dy), cl = Math.min(d, JR);
      const nx = d>0?dx/d:0;
      const ny = d>0?dy/d:0;
      jK.style.left = (jBX + nx*cl - 24) + 'px';
      jK.style.top  = (jBY + ny*cl - 24) + 'px';
      inp.steer = nx * Math.min(d/JR, 1);
    }
  }, { passive:false });

  ['touchend','touchcancel'].forEach(ev => lz.addEventListener(ev, e => {
    for (const t of e.changedTouches) {
      if (t.identifier !== joyId) continue;
      joyId = -1; inp.steer = 0;
      jB.style.display = jK.style.display = 'none';
    }
  }));

  holdB('bGas',   () => inp.gas=1,      () => inp.gas=0);
  holdB('bBrake', () => inp.brake=true,  () => inp.brake=false);
  holdB('bHbk',   () => inp.hbk=true,    () => inp.hbk=false);

  document.getElementById('bNitro').addEventListener('touchstart', e => { e.preventDefault(); fireNitro(); }, { passive:false });
  document.getElementById('bNitro').addEventListener('mousedown', fireNitro);

  document.addEventListener('keydown', e => {
    if (e.code==='ArrowUp'  ||e.code==='KeyW') inp.gas=1;
    if (e.code==='ArrowDown'||e.code==='KeyS') inp.brake=true;
    if (e.code==='ArrowLeft'||e.code==='KeyA') inp.steer=-1;
    if (e.code==='ArrowRight'||e.code==='KeyD')inp.steer=1;
    if (e.code==='Space')     inp.hbk=true;
    if (e.code==='ShiftLeft') fireNitro();
    if (e.code==='Escape')    togglePause();
  });
  document.addEventListener('keyup', e => {
    if (e.code==='ArrowUp'  ||e.code==='KeyW') inp.gas=0;
    if (e.code==='ArrowDown'||e.code==='KeyS') inp.brake=false;
    if ((e.code==='ArrowLeft'||e.code==='KeyA') && inp.steer<0) inp.steer=0;
    if ((e.code==='ArrowRight'||e.code==='KeyD')&& inp.steer>0) inp.steer=0;
    if (e.code==='Space') inp.hbk=false;
  });
}

function holdB(id, dn, up) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); dn(); }, { passive:false });
  el.addEventListener('touchend',   e => { e.preventDefault(); up(); });
  el.addEventListener('touchcancel',e => { e.preventDefault(); up(); });
  el.addEventListener('mousedown', dn);
  document.addEventListener('mouseup', up);
}

// ── NİTRO ──────────────────────────────────────────────
function fireNitro() {
  if (player.nitroOn || player.nitroCh || player.nitroPct < 0.15) return;
  player.nitroOn = true; player.nitroPct = 0;
  setTimeout(() => {
    player.nitroOn = false; player.nitroCh = true;
    setTimeout(() => { player.nitroCh = false; player.nitroPct = 1; }, 7000);
  }, 2500);
}

function updateNitroUI() {
  const fill = document.getElementById('nitroFill');
  const lbl  = document.getElementById('nitroLbl');
  if (player.nitroOn) {
    fill.style.cssText = 'width:100%;background:#fff';
    lbl.textContent = '⚡ AKTİF!';
  } else if (player.nitroCh) {
    player.nitroPct = Math.min(1, player.nitroPct + 0.003);
    fill.style.cssText = `width:${player.nitroPct*100}%;background:#888`;
    lbl.textContent = '⏳ ŞARJ...';
  } else {
    fill.style.cssText = 'width:100%;background:#00CCFF';
    lbl.textContent = '⚡ NİTRO';
  }
}

// ── OYUNCU FİZİK ───────────────────────────────────────
function updatePlayer(dt) {
  if (player.raceFinished) return;
  const maxS = player.maxSpeed * (player.nitroOn ? 1.45 : 1);

  if (inp.gas > 0 && !inp.brake)
    player.speed = Math.min(player.speed + player.accel*dt, maxS);
  else if (inp.brake) {
    const bf = inp.hbk ? player.brakeF*2 : player.brakeF;
    player.speed = Math.max(player.speed - bf*dt, inp.hbk ? -4 : -8);
  }
  const fr = inp.hbk ? 0.78 : player.friction;
  player.speed *= Math.pow(fr, dt*60);

  // Direksiyon
  const ts = inp.steer * player.maxSteer;
  player.steer += (ts - player.steer) * dt * player.steerSpd;
  if (Math.abs(inp.steer) < 0.05) player.steer *= (1 - dt * player.steerRet);

  if (Math.abs(player.speed) > 0.3) {
    const sf = Math.min(Math.abs(player.speed)/player.maxSpeed, 1);
    player.angle += player.steer * sf * dt * 2.7;
  }

  // Hareket dene
  const nx = player.x + Math.sin(player.angle)*player.speed*dt;
  const nz = player.z + Math.cos(player.angle)*player.speed*dt;

  // Pist sınırı
  const od = distToTrack(nx, nz);
  if (od > HALF_W + 2) {
    player.speed *= 0.84;
    const near = nearestTrackPt(player.x, player.z);
    player.x += (near.x - player.x) * 0.05;
    player.z += (near.z - player.z) * 0.05;
  } else {
    player.x = nx; player.z = nz;
  }

  // Mesh güncelle
  player.mesh.position.set(player.x, 0, player.z);
  player.mesh.rotation.y = player.angle;

  // Tekerlek animasyonu
  const wr = player.speed * dt * 0.9;
  player.wheels.forEach((w, i) => {
    w.children[0].rotation.x += wr;
    if (i < 2) w.rotation.y = player.steer * 0.72;
  });
}

// ── AI FİZİK ───────────────────────────────────────────
function updateAI(ai, dt) {
  if (ai.raceFinished) return;
  const wp = WAYPOINTS[ai.wpNext % WAYPOINTS.length];
  const dx = wp.x - ai.x, dz = wp.z - ai.z;

  if (dx*dx + dz*dz < WP_R*WP_R) {
    ai.wpNext++;
    if (ai.wpNext % WAYPOINTS.length === 0) {
      ai.lapsDone++;
      if (ai.lapsDone >= TOTAL_LAPS) { ai.raceFinished = true; return; }
    }
  }

  // Yön hesapla
  const tAng = Math.atan2(dx, dz);
  let da = tAng - ai.angle;
  while (da >  Math.PI) da -= 2*Math.PI;
  while (da < -Math.PI) da += 2*Math.PI;
  ai.angle += Math.sign(da) * Math.min(Math.abs(da), 3.5*dt);

  // Virajda yavaşla
  const sharp = Math.abs(da);
  const tSpd  = sharp > 0.7 ? ai.maxSpeed*0.60 : sharp > 0.35 ? ai.maxSpeed*0.82 : ai.maxSpeed;
  if (ai.speed < tSpd) ai.speed = Math.min(ai.speed + ai.accel*dt, tSpd);
  else                 ai.speed = Math.max(ai.speed - ai.brakeF*dt, 0);

  ai.x += Math.sin(ai.angle)*ai.speed*dt;
  ai.z += Math.cos(ai.angle)*ai.speed*dt;

  // Pist sınırı
  if (distToTrack(ai.x, ai.z) > HALF_W + 2) {
    ai.speed *= 0.88;
    const nr = nearestTrackPt(ai.x, ai.z);
    ai.x += (nr.x - ai.x)*0.06;
    ai.z += (nr.z - ai.z)*0.06;
  }
  ai.mesh.position.set(ai.x, 0, ai.z);
  ai.mesh.rotation.y = ai.angle;
}

// ── PİST MESAFE YARDIMCILARI ────────────────────────────
function distToTrackFast(x, z) {
  let min = Infinity;
  for (let i = 0; i < trackSamples.length; i += 4) {
    const p = trackSamples[i];
    const d = (p.x-x)**2 + (p.z-z)**2;
    if (d < min) { min = d; if (d < 9) return Math.sqrt(d); }
  }
  return Math.sqrt(min);
}

function distToTrack(x, z) {
  let min = Infinity;
  for (let i = 0; i < trackSamples.length; i += 3) {
    const p = trackSamples[i];
    const d = (p.x-x)**2 + (p.z-z)**2;
    if (d < min) min = d;
  }
  return Math.sqrt(min);
}

function nearestTrackPt(x, z) {
  let best = trackSamples[0], min = Infinity;
  for (let i = 0; i < trackSamples.length; i += 2) {
    const p = trackSamples[i];
    const d = (p.x-x)**2 + (p.z-z)**2;
    if (d < min) { min = d; best = p; }
  }
  return best;
}

// ── TUR / WAYPOINT TAKİBİ ──────────────────────────────
function processWaypoints(ent, isPlayer) {
  if (ent.raceFinished) return;
  const wp = WAYPOINTS[ent.wpNext % WAYPOINTS.length];
  const dx = wp.x - ent.x, dz = wp.z - ent.z;
  if (dx*dx + dz*dz < WP_R*WP_R) {
    ent.wpNext++;
    if (ent.wpNext % WAYPOINTS.length === 0) {
      ent.lapsDone++;
      if (isPlayer) {
        if (ent.lapsDone >= TOTAL_LAPS) { finishRace(); return; }
        document.getElementById('lapVal').textContent = `${ent.lapsDone+1}/${TOTAL_LAPS}`;
        showNotif(`🏁 Tur ${ent.lapsDone}/${TOTAL_LAPS} tamamlandı!`, '#FFD700');
      }
    }
  }
}

function getProgress(ent) {
  return ent.lapsDone * WAYPOINTS.length + ent.wpNext;
}

function getPos() {
  const pp = getProgress(player);
  let pos = 1;
  aiCars.forEach(ai => { if (getProgress(ai) > pp) pos++; });
  return pos;
}

// ── KAMERA ─────────────────────────────────────────────
let cX=0, cY=5.5, cZ=0;
function updateCamera(dt) {
  const dist = 10.5, h = 5.2;
  const tx = player.x - Math.sin(player.angle)*dist;
  const tz = player.z - Math.cos(player.angle)*dist;
  cX += (tx-cX)*dt*7; cY += (h-cY)*dt*5; cZ += (tz-cZ)*dt*7;
  camera.position.set(cX, cY, cZ);
  camera.lookAt(player.x, 1.0, player.z);
}

// ── HUD GÜNCELLE ───────────────────────────────────────
let _hf = 0;
function updateHUD() {
  document.getElementById('spdVal').textContent = Math.round(Math.abs(player.speed)*3.6);
  updateNitroUI();
  if (++_hf % 4 !== 0) return;
  const posArr = ['1.','2.','3.','4.'];
  document.getElementById('posVal').textContent = posArr[getPos()-1] || '4.';
  const m = Math.floor(raceTimer/60);
  const s = (raceTimer%60).toFixed(1).padStart(4,'0');
  document.getElementById('timeVal').textContent = `${m}:${s}`;
}

// ── COUNTDOWN ──────────────────────────────────────────
function startCountdown(cb) {
  const ov = document.getElementById('cdOverlay');
  const el = document.getElementById('cdNum');
  ov.style.display = 'flex';
  let n = 3;
  el.textContent = n;
  el.style.color = '#FF4444';

  const iv = setInterval(() => {
    n--;
    if (n > 0) {
      el.textContent = n;
      el.style.color = n===2 ? '#FFAA00' : '#FFFF33';
      el.style.animation = 'none'; void el.offsetWidth; el.style.animation = 'cdPop .5s ease-out';
    } else {
      el.textContent = 'BAŞLA!';
      el.style.color = '#44FF44';
      el.style.fontSize = 'clamp(44px,11vw,88px)';
      el.style.animation = 'none'; void el.offsetWidth; el.style.animation = 'cdPop .5s ease-out';
      clearInterval(iv);
      setTimeout(() => {
        ov.style.display = 'none';
        el.style.fontSize = '';
        cb();
      }, 900);
    }
  }, 1000);
}

// ── BİLDİRİM ───────────────────────────────────────────
let _nTO = null;
function showNotif(msg, col='#fff') {
  const el = document.getElementById('notif');
  el.textContent = msg; el.style.color = col; el.style.borderColor = col;
  el.style.display = 'block';
  clearTimeout(_nTO);
  _nTO = setTimeout(() => el.style.display='none', 2600);
}

// ── YARIŞI BİTİR ───────────────────────────────────────
function finishRace() {
  player.raceFinished = true;
  state = 'result';
  const pos = getPos();
  const titles = ['🏆 BİRİNCİ OLDUN!','🥈 İKİNCİ OLDUN!','🥉 ÜÇÜNCÜ OLDUN!','4. OLDUN'];
  const colors = ['#FFD700','#C0C0C0','#CD7F32','#aaa'];
  const m = Math.floor(raceTimer/60);
  const s = (raceTimer%60).toFixed(2).padStart(5,'0');
  document.getElementById('resTitle').textContent = titles[pos-1] || titles[3];
  document.getElementById('resTitle').style.color  = colors[pos-1] || '#aaa';
  document.getElementById('resTime').textContent  = `Süre: ${m}:${s}`;
  document.getElementById('resPos').textContent   = `${pos}. sıradan bitirdin`;
  document.getElementById('resultScreen').style.display = 'flex';
  document.getElementById('hud').style.display    = 'none';
  document.getElementById('ctrl').style.display   = 'none';
}

// ── DURAKLAMA ──────────────────────────────────────────
function togglePause() {
  if (state === 'racing') {
    state = 'paused';
    document.getElementById('pauseScreen').style.display = 'flex';
    clock.stop();
  } else if (state === 'paused') {
    state = 'racing';
    document.getElementById('pauseScreen').style.display = 'none';
    clock.start();
  }
}

function goMenu() {
  state = 'menu';
  document.getElementById('pauseScreen').style.display   = 'none';
  document.getElementById('resultScreen').style.display  = 'none';
  document.getElementById('hud').style.display   = 'none';
  document.getElementById('ctrl').style.display  = 'none';
  document.getElementById('menuScreen').style.display = 'flex';
  clock.stop();
}

// ── OYUNU BAŞLAT ───────────────────────────────────────
function startGame() {
  document.getElementById('menuScreen').style.display   = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  raceTimer = 0; _hf = 0;
  spawnAll();
  cX = player.x - Math.sin(player.angle)*10;
  cY = 5;
  cZ = player.z - Math.cos(player.angle)*10;
  document.getElementById('lapVal').textContent = `1/${TOTAL_LAPS}`;

  startCountdown(() => {
    state = 'racing';
    document.getElementById('hud').style.display  = 'block';
    document.getElementById('ctrl').style.display = 'block';
    clock.start();
    showNotif('🏎 3 tur tamamla! İyi yarışlar!', '#4CAF50');
  });
}

// ── ANA DÖNGÜ ──────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  if (state === 'racing') {
    const dt = Math.min(clock.getDelta(), 0.05);
    raceTimer += dt;
    updatePlayer(dt);
    aiCars.forEach(ai => updateAI(ai, dt));
    processWaypoints(player, true);
    aiCars.forEach(ai => processWaypoints(ai, false));
    updateCamera(dt);
    updateHUD();
  } else if (state === 'menu') {
    const t = Date.now() * 0.00025;
    camera.position.set(Math.sin(t)*130, 55, Math.cos(t)*130);
    camera.lookAt(0, 0, 0);
  }

  renderer.render(scene, camera);
}

// ── ARAÇ SEÇİM MENÜSÜ ──────────────────────────────────
function buildCarSelect() {
  const c = document.getElementById('carSelect');
  CAR_COLORS.forEach((col, i) => {
    const el = document.createElement('div');
    el.className = 'cOpt' + (i===0 ? ' sel' : '');
    el.style.background = '#' + col.toString(16).padStart(6,'0');
    el.title = CAR_NAMES[i];
    const pick = () => {
      document.querySelectorAll('.cOpt').forEach(e => e.classList.remove('sel'));
      el.classList.add('sel'); selectedCar = i;
    };
    el.onclick = pick;
    el.addEventListener('touchstart', e => { e.preventDefault(); pick(); }, { passive:false });
    c.appendChild(el);
  });
}

// ── UI OLAYLAR ─────────────────────────────────────────
document.getElementById('btnPlay').onclick    = startGame;
document.getElementById('btnAgain').onclick   = startGame;
document.getElementById('btnGoMenu').onclick  = goMenu;
document.getElementById('btnResume').onclick  = togglePause;
document.getElementById('btnMenuP').onclick   = goMenu;
document.getElementById('pauseBtn').onclick   = togglePause;

// ── BAŞLAT ─────────────────────────────────────────────
initThree();
buildTrack();
buildCarSelect();
setupInput();
clock.start();
loop();
console.log('🏎 Street Racer MVP v2 hazır!');
</script>
